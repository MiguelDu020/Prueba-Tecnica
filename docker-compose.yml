version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend/data:/app/data

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "5173:80"
    depends_on:
      - backend
